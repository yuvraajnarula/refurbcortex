services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: refurbcortex-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - MEM0_TELEMETRY=false
      - API_URL=http://localhost:8000
      - QDRANT_HOST=qdrant
      - REDIS_URL=redis://redis:6379
      - PATH=/app/.venv/bin:$PATH
    volumes:
      - ./models:/app/models:rw
      - ./data:/app/data
      - .env:/app/.env:ro
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1
      --loop uvloop --http httptools --timeout-keep-alive 65 --log-level warning
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: "6G"
        reservations:
          cpus: "1.0"
          memory: "2G"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      - refurb-net
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_started

  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: refurbcortex-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "512M"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - refurb-net

  redis:
    image: redis:7-alpine
    container_name: refurbcortex-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "256M"
    networks:
      - refurb-net

  prometheus:
    image: prom/prometheus:latest
    container_name: refurbcortex-prom
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "512M"
    networks:
      - refurb-net

  grafana:
    image: grafana/grafana:latest
    container_name: refurbcortex-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana-refurbcortex.json:/etc/grafana/provisioning/dashboards/dashboard.json:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=refurb_secure_2024
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      prometheus:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "256M"
    networks:
      - refurb-net
  x-streamlit-base: &streamlit-base
    image: python:3.11-slim
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./ui:/app/ui:ro
      - ./data:/app/data:ro
      - ./models:/app/models:ro
    environment:
      - API_URL=http://api:8000
      - QDRANT_HOST=qdrant
      - REDIS_URL=redis://redis:6379
      - PATH=/app/.venv/bin:$PATH
    depends_on:
      api:
        condition: service_healthy
    networks:
      - refurb-net
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: "2G"

  streamlit-analytics:
    <<: *streamlit-base
    container_name: refurbcortex-analytics
    ports:
      - "8501:8501"
    command: >
      bash -c "pip install -q streamlit plotly pandas requests &&
               streamlit run ui/analytics_dashboard.py 
               --server.port 8501 
               --server.address 0.0.0.0 
               --server.headless true
               --server.enableCORS false
               --server.enableXsrfProtection false"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  streamlit-ev:
    <<: *streamlit-base
    container_name: refurbcortex-ev
    ports:
      - "8502:8501"
    command: >
      bash -c "pip install -q streamlit plotly pandas requests &&
               streamlit run ui/ev_dashboard.py 
               --server.port 8501 
               --server.address 0.0.0.0 
               --server.headless true
               --server.enableCORS false
               --server.enableXsrfProtection false"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: "1.5G"

  streamlit-voice:
    <<: *streamlit-base
    container_name: refurbcortex-voice
    ports:
      - "8503:8501"
    command: >
      bash -c "pip install -q streamlit faster-whisper langdetect &&
               streamlit run ui/components/voice_input.py 
               --server.port 8501 
               --server.address 0.0.0.0 
               --server.headless true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "1G"
  gradio-demo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: refurbcortex-gradio
    restart: unless-stopped
    ports:
      - "7860:7860"
    volumes:
      - ./models:/app/models:ro
      - ./spaces:/app/spaces:ro
    environment:
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860
      - API_URL=http://api:8000
      - PATH=/app/.venv/bin:$PATH
    command: >
      python spaces/app.py
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: "4G"
    networks:
      - refurb-net
    depends_on:
      api:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: refurbcortex-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - streamlit-analytics
      - streamlit-ev
      - streamlit-voice
      - gradio-demo
      - api
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "256M"
    networks:
      - refurb-net
volumes:
  qdrant-data:
  redis-data:
  prom-data:
  grafana-data:

networks:
  refurb-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16